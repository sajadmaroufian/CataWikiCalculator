<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Catawiki Calc</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { -webkit-tap-highlight-color: transparent; }
        .card { background: white; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
    </style>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/1011/1011504.png">
    <link rel="manifest" href="/CataWikiCalculator/manifest.json">
</head>
<body class="bg-gray-50 min-h-screen p-4 font-sans">

    <div class="max-w-md mx-auto">
        <h1 class="text-2xl font-bold text-center text-blue-600 mb-6">Catawiki Watch Calc</h1>

        <div class="card p-6 space-y-4">
            <div class="flex items-center justify-between">
                <span class="text-gray-700 font-medium">Currency</span>
                <button id="currencyBtn" onclick="toggleCurrency()" class="bg-blue-100 text-blue-700 px-4 py-1 rounded-full font-bold">€ EUR</button>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-600">Watch Price</label>
                <input type="number" id="price" class="w-full mt-1 p-3 border rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" placeholder="0.00">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-600">Shipping Cost</label>
                <input type="number" id="shipping" class="w-full mt-1 p-3 border rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" placeholder="0.00">
            </div>

            <label class="flex items-center space-x-3 cursor-pointer">
                <input type="checkbox" id="isEU" checked class="w-5 h-5 text-blue-600 rounded">
                <span class="text-gray-700">Seller is inside EU?</span>
            </label>

            <button onclick="calculate()" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl shadow-lg active:scale-95 transition-transform">
                CALCULATE
            </button>
        </div>

        <div id="results" class="hidden mt-6 card p-6 border-l-4 border-blue-500">
            <h2 class="text-lg font-bold mb-3">Breakdown</h2>
            <div class="space-y-2 text-gray-600">
                <div class="flex justify-between"><span>Auction Fee (9% + 3):</span> <span id="resFee"></span></div>
                <div id="importSection" class="hidden">
                    <div class="flex justify-between"><span>Customs Duty (4.5%):</span> <span id="resDuty"></span></div>
                    <div class="flex justify-between"><span>VAT (19%):</span> <span id="resVAT"></span></div>
                </div>
                <hr class="my-2">
                <div class="flex justify-between text-xl font-bold text-blue-600">
                    <span>Total Price:</span> <span id="resTotal"></span>
                </div>
            </div>
        </div>
    </div>

    <script>
        let isEuro = true;

        function toggleCurrency() {
            isEuro = !isEuro;
            document.getElementById('currencyBtn').innerText = isEuro ? '€ EUR' : '$ USD';
        }

        function calculate() {
            const price = parseFloat(document.getElementById('price').value) || 0;
            const shipping = parseFloat(document.getElementById('shipping').value) || 0;
            const isEU = document.getElementById('isEU').checked;
            const sym = isEuro ? '€' : '$';

            const fee = (price * 0.09) + 3;
            let duty = 0;
            let vat = 0;

            if (!isEU) {
                duty = price * 0.045;
                vat = (price + shipping + duty) * 0.19;
                document.getElementById('importSection').classList.remove('hidden');
            } else {
                document.getElementById('importSection').classList.add('hidden');
            }

            const total = price + shipping + fee + duty + vat;

            document.getElementById('resFee').innerText = sym + fee.toFixed(2);
            document.getElementById('resDuty').innerText = sym + duty.toFixed(2);
            document.getElementById('resVAT').innerText = sym + vat.toFixed(2);
            document.getElementById('resTotal').innerText = sym + total.toFixed(2);
            document.getElementById('results').classList.remove('hidden');
        }
    </script>
    <script>
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('/CataWikiCalculator/sw.js');
            }
    </script>
</body>
</html>
